{# Language switcher — renders at the top of <body>, before the document. #}
{% extends "!layout.html" %}

{% block relbar1 %}
<div class="language-switch">
  {% if display_language == 'en' %}
    <span class="lang-label">🌐</span>
    <span class="lang-link disabled">English</span>
    <span class="lang-sep">|</span>
    <a href="../zh/{{ pagename }}.html" class="lang-link">中文</a>
  {% else %}
    <span class="lang-label">🌐</span>
    <a href="../en/{{ pagename }}.html" class="lang-link">English</a>
    <span class="lang-sep">|</span>
    <span class="lang-link disabled">中文</span>
  {% endif %}
</div>
{{ super() }}
{% endblock %}
