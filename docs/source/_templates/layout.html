{# Language switcher button — fixed top-right corner. #}
{% extends "!layout.html" %}

{% block relbar1 %}
<div class="lang-switch-wrapper">
  {% if pagename.endswith('_zh') %}
    <a href="{{ pagename | replace('_zh', '') }}.html" class="lang-btn">EN</a>
    <span class="lang-btn disabled">ZH</span>
  {% else %}
    <span class="lang-btn disabled">EN</span>
    <a href="{{ pagename }}_zh.html" class="lang-btn">ZH</a>
  {% endif %}
</div>
{{ super() }}
{% endblock %}
